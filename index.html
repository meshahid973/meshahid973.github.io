<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About Me</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black:       #000000;
    --void:        #030303;
    --white:       #ffffff;
    --dim:         rgba(255,255,255,0.55);
    --faint:       rgba(255,255,255,0.25);
    --ghost:       rgba(255,255,255,0.07);
    --glow-a:      #c8a8ff;
    --glow-b:      #7eb8ff;
    --glow-c:      #ff9fd6;
    --card-bg:     rgba(255,255,255,0.042);
    --card-border: rgba(255,255,255,0.10);
    --card-blur:   28px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-mono:    'DM Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: var(--font-display);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0;
    animation: nebulaPulse 14s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    will-change: transform, opacity;
  }
  .nebula-a {
    width: 700px; height: 700px;
    top: -200px; left: -200px;
    background: radial-gradient(circle, #3a1060 0%, transparent 70%);
    animation-delay: 0s;
  }
  .nebula-b {
    width: 600px; height: 600px;
    bottom: -150px; right: -150px;
    background: radial-gradient(circle, #0d2a58 0%, transparent 70%);
    animation-delay: -5s;
    animation-name: nebulaPulseB;
  }
  .nebula-c {
    width: 400px; height: 400px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #1a0a30 0%, transparent 70%);
    animation-delay: -9s;
  }
  
  @keyframes nebulaPulse {
    0%,100% { opacity: 0.35; transform: scale(1);    }
    50%      { opacity: 0.65; transform: scale(1.12); }
  }
  @keyframes nebulaPulseB {
    0%,100% { opacity: 0.30; transform: scale(1);    }
    50%      { opacity: 0.55; transform: scale(1.10); }
  }

  .scene {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
  }

  .card {
    position: relative;
    width: min(480px, 90vw);
    padding: 52px 48px 48px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 32px;
    backdrop-filter: blur(var(--card-blur)) saturate(180%) brightness(1.05);
    -webkit-backdrop-filter: blur(var(--card-blur)) saturate(180%) brightness(1.05);
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.06) inset,
      0 10px 80px rgba(0,0,0,0.9),
      0 0 120px rgba(120,80,255,0.06);
    animation: cardReveal 1.4s cubic-bezier(0.16,1,0.3,1) both;
    overflow: hidden;
    transform-style: preserve-3d;
    will-change: transform;
  }
  
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)    scale(1);    }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 32px;
    background: radial-gradient(
      800px circle at var(--mouse-x, 50%) var(--mouse-y, 0%),
      rgba(255,255,255,0.12),
      transparent 40%
    );
    pointer-events: none;
    z-index: 2;
    opacity: 0.8;
    transition: opacity 0.4s ease;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 33px;
    background: conic-gradient(
      from var(--angle, 0deg),
      transparent 0deg,
      rgba(180,120,255,0.6) 60deg,
      transparent 120deg,
      rgba(100,160,255,0.5) 240deg,
      transparent 300deg
    );
    -webkit-mask: linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    mask: linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 1px;
    animation: spinBorder 6s linear infinite;
    pointer-events: none;
  }
  
  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes spinBorder {
    to { --angle: 360deg; }
  }

  .name {
    font-size: clamp(2.6rem, 7vw, 3.4rem);
    font-weight: 300;
    letter-spacing: -0.01em;
    line-height: 1.05;
    color: var(--white);
    animation: fadeUp 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    white-space: nowrap;
    transform: translateZ(30px);
  }
  .name em {
    font-style: italic;
    font-weight: 300;
    background: linear-gradient(90deg, var(--glow-a), var(--glow-b));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    margin: 28px 0;
    animation: fadeUp 1.2s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    transform: translateZ(10px);
  }

  .desc {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--dim);
    letter-spacing: 0.01em;
    animation: fadeUp 1.2s 0.7s cubic-bezier(0.16,1,0.3,1) both;
    transform: translateZ(20px);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 28px;
    animation: fadeUp 1.2s 0.85s cubic-bezier(0.16,1,0.3,1) both;
    transform: translateZ(25px);
  }
  .tag {
    padding: 6px 16px;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--faint);
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    cursor: default;
  }
  .tag:hover {
    border-color: rgba(180,140,255,0.6);
    color: rgba(200,170,255,1);
    background: rgba(140,90,255,0.12);
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 4px 12px rgba(180,140,255,0.15);
  }

  .links {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    animation: fadeUp 1.2s 1s cubic-bezier(0.16,1,0.3,1) both;
    transform: translateZ(30px);
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 20px;
    border-radius: 16px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    cursor: pointer;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: rgba(255,255,255,0.92);
    color: #000;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
  }
  .btn-primary:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 40px rgba(255,255,255,0.25);
    background: #ffffff;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.05);
    color: var(--faint);
    border-color: rgba(255,255,255,0.10);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .btn svg { flex-shrink: 0; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
  .btn:hover svg { transform: scale(1.1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .shooting {
    position: fixed;
    top: 0; left: 0;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
  }

  .system-hud {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 50;
    background: rgba(15, 15, 20, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 14px 22px;
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--font-mono);
    animation: fadeUp 1.2s 1.2s cubic-bezier(0.16,1,0.3,1) both;
    color: var(--white);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), border-color 0.4s, background 0.4s;
    cursor: default;
  }
  .system-hud:hover {
    transform: translateY(-4px);
    border-color: rgba(180, 140, 255, 0.4);
    background: rgba(25, 20, 35, 0.5);
  }
  .hud-time {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  #time-hours {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: -0.05em;
  }
  #time-ampm {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
  .hud-divider {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
  }
  .hud-weather {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .weather-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #weather-temp {
    font-size: 1.15rem;
    font-weight: 300;
    line-height: 1;
  }
  #weather-desc {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 5px;
  }
  .weather-icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--glow-b);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div class="nebula nebula-a"></div>
<div class="nebula nebula-b"></div>

<canvas id="cosmos"></canvas>

<div class="scene">

      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

<script>
const canvas = document.getElementById('cosmos');
const ctx    = canvas.getContext('2d');

let W, H, stars = [], dpr;
let mx = 0, my = 0;
let smoothMx = 0, smoothMy = 0;
let mouseRawX = window.innerWidth / 2, mouseRawY = window.innerHeight / 2;

function lerp(start, end, factor) {
  return start + (end - start) * factor;
}

function resize() {
  dpr    = window.devicePixelRatio || 1;
  W      = window.innerWidth;
  H      = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  buildStars();
}

function buildStars() {
  stars = [];

  for (let i = 0; i < 420; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 0.5 + 0.15,
      a: Math.random() * 0.35 + 0.05,
      da: (Math.random() - 0.5) * 0.003,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 2 + 0.5,
      layer: 0,
      parallax: 0.2
    });
  }

  for (let i = 0; i < 180; i++) {
    const r = Math.random() * 1.0 + 0.4;
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r,
      a: Math.random() * 0.7 + 0.1,
      da: (Math.random() - 0.5) * 0.006,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 3 + 1,
      layer: 1,
      glowColor: pickGlow(),
      parallax: 0.6
    });
  }

  for (let i = 0; i < 40; i++) {
    const r = Math.random() * 1.8 + 0.9;
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r,
      a: Math.random() * 0.85 + 0.15,
      da: (Math.random() - 0.5) * 0.009,
      vx: (Math.random() - 0.5) * 8,
      vy: Math.random() * 5 + 2,
      layer: 2,
      glowColor: pickGlow(),
      crosshair: Math.random() < 0.4,
      parallax: 1.2
    });
  }

  for (let i = 0; i < 16; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 2.2,
      a: 0.6,
      da: 0.004,
      vx: (Math.random() - 0.5) * 1.5,
      vy: (Math.random() - 0.5) * 1.5,
      layer: 3,
      glowColor: '#c8a8ff',
      constellation: true,
      parallax: 0.8
    });
  }
}

function pickGlow() {
  const palette = ['#ffffff', '#c8a8ff', '#7eb8ff', '#ff9fd6', '#a8ffdf'];
  return palette[Math.floor(Math.random() * palette.length)];
}

function drawStar(s, mouseRepelX, mouseRepelY) {
  ctx.save();
  
  const pX = s.x + smoothMx * s.parallax * 30 + mouseRepelX;
  const pY = s.y + smoothMy * s.parallax * 30 + mouseRepelY;

  if (s.layer === 0) {
    ctx.globalAlpha = Math.max(0.03, Math.min(0.4, s.a));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pX, pY, s.r, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.globalAlpha = Math.max(0.05, Math.min(1, s.a));

    if (s.layer >= 2) {
      const g = ctx.createRadialGradient(pX, pY, 0, pX, pY, s.r * 7);
      g.addColorStop(0, s.glowColor + 'aa');
      g.addColorStop(1, 'transparent');
      ctx.globalAlpha = Math.max(0.02, Math.min(0.35, s.a * 0.45));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(pX, pY, s.r * 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = Math.max(0.05, Math.min(1, s.a));
    }

    ctx.fillStyle = s.glowColor || '#fff';
    ctx.beginPath();
    ctx.arc(pX, pY, s.r, 0, Math.PI * 2);
    ctx.fill();

    if (s.crosshair) {
      ctx.globalAlpha = Math.max(0.04, Math.min(0.25, s.a * 0.3));
      ctx.strokeStyle = s.glowColor || '#fff';
      ctx.lineWidth = 0.5;
      const spike = s.r * 12;
      ctx.beginPath();
      ctx.moveTo(pX - spike, pY);
      ctx.lineTo(pX + spike, pY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pX, pY - spike);
      ctx.lineTo(pX, pY + spike);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawConstellations() {
  const nodes = stars.filter(s => s.constellation);
  ctx.save();
  ctx.lineWidth   = 0.6;
  
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      
      const pXa = a.x + smoothMx * a.parallax * 30;
      const pYa = a.y + smoothMy * a.parallax * 30;
      const pXb = b.x + smoothMx * b.parallax * 30;
      const pYb = b.y + smoothMy * b.parallax * 30;

      const dx = pXa - pXb;
      const dy = pYa - pYb;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 180) {
        const opacity = 0.15 * (1 - dist / 180);
        ctx.strokeStyle = `rgba(200, 168, 255, ${opacity})`;
        ctx.beginPath();
        ctx.moveTo(pXa, pYa);
        ctx.lineTo(pXb, pYb);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

let lastTick = performance.now();

function tick(time) {
  const dt = (time - lastTick) / 1000 || 0.016;
  lastTick = time;

  ctx.clearRect(0, 0, W, H);
  drawConstellations();

  for (const s of stars) {
    s.a += s.da * (dt * 60);
    if (s.a > 0.95 || s.a < 0.04) s.da *= -1;

    s.x += s.vx * dt * 10;
    s.y += s.vy * dt * 10;

    if (s.x < -50)  s.x = W + 50;
    if (s.x > W+50) s.x = -50;
    if (s.y > H+50) s.y = -50;

    let repelX = 0, repelY = 0;
    const dx = s.x - mouseRawX;
    const dy = s.y - mouseRawY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 150) {
      const force = (150 - dist) / 150;
      repelX = (dx / dist) * force * 20 * s.parallax;
      repelY = (dy / dist) * force * 20 * s.parallax;
    }

    drawStar(s, repelX, repelY);
  }

  requestAnimationFrame(tick);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(tick);

function launchShooter() {
  const el   = document.createElement('div');
  el.className = 'shooting';
  document.body.appendChild(el);

  const startX = Math.random() * W * 0.9;
  const startY = Math.random() * H * 0.25;
  const angle  = 25 + Math.random() * 25;
  const dist   = 350 + Math.random() * 300;
  const dur    = 700  + Math.random() * 600;

  const rad   = angle * Math.PI / 180;
  const endX  = startX + Math.cos(rad) * dist;
  const endY  = startY + Math.sin(rad) * dist;

  el.style.left = startX + 'px';
  el.style.top  = startY + 'px';

  const tail = document.createElement('div');
  tail.style.cssText = `
    position:absolute; top:50%; left:0;
    transform:translateY(-50%);
    width:${80 + Math.random() * 100}px; height:2px;
    background:linear-gradient(90deg,rgba(255,255,255,1),rgba(200,168,255,0.6),transparent);
    transform-origin:right center;
    rotate:${angle}deg;
    pointer-events:none;
    border-radius:2px;
  `;
  el.appendChild(tail);

  const startTime = performance.now();
  function animate(now) {
    const t = Math.min(1, (now - startTime) / dur);
    const ease = 1 - Math.pow(1 - t, 4);
    el.style.left = (startX + (endX - startX) * ease) + 'px';
    el.style.top  = (startY + (endY - startY) * ease) + 'px';
    el.style.opacity = t < 0.1 ? t * 10 : t > 0.7 ? (1 - t) * 3.33 : 1;
    if (t < 1) requestAnimationFrame(animate);
    else el.remove();
  }
  requestAnimationFrame(animate);

  setTimeout(launchShooter, 2500 + Math.random() * 5000);
}
setTimeout(launchShooter, 1500);
setTimeout(launchShooter, 4000);

window.addEventListener('mousemove', e => {
  mouseRawX = e.clientX;
  mouseRawY = e.clientY;
  mx = (e.clientX / W - 0.5) * 2;
  my = (e.clientY / H - 0.5) * 2;
});

const card = document.querySelector('.card');
const nebulaA = document.querySelector('.nebula-a');
const nebulaB = document.querySelector('.nebula-b');

card.addEventListener('mousemove', e => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  card.style.setProperty('--mouse-x', `${x}px`);
  card.style.setProperty('--mouse-y', `${y}px`);
});

(function tiltLoop() {
  smoothMx = lerp(smoothMx, mx, 0.06);
  smoothMy = lerp(smoothMy, my, 0.06);

  const rx = smoothMy * 8;
  const ry = smoothMx * -8;
  
  card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  
  nebulaA.style.transform = `translate(${smoothMx * -30}px, ${smoothMy * -30}px)`;
  nebulaB.style.transform = `translate(${smoothMx * 25}px, ${smoothMy * 25}px)`;
  
  requestAnimationFrame(tiltLoop);
})();

document.addEventListener('click', e => {
  const particleCount = 18;
  for (let i = 0; i < particleCount; i++) {
    const sp = document.createElement('div');
    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.4 - 0.2);
    const vel   = 80 + Math.random() * 120;
    sp.style.cssText = `
      position:fixed; pointer-events:none; z-index:99;
      width:${2 + Math.random() * 4}px;
      height:${2 + Math.random() * 4}px;
      border-radius:50%;
      background:${['#c8a8ff','#7eb8ff','#ffffff','#ff9fd6','#a8ffdf'][Math.floor(Math.random()*5)]};
      left:${e.clientX}px; top:${e.clientY}px;
      box-shadow: 0 0 ${4 + Math.random()*8}px currentColor;
    `;
    document.body.appendChild(sp);
    
    let vx = Math.cos(angle) * vel;
    let vy = Math.sin(angle) * vel;
    let x = 0;
    let y = 0;
    let alpha = 1;
    
    let pLastTime = performance.now();
    
    (function anim(time) {
      const dt = (time - pLastTime) / 1000;
      pLastTime = time;
      
      vy += 400 * dt;
      vx *= Math.pow(0.5, dt);
      vy *= Math.pow(0.7, dt); 
      
      x += vx * dt;
      y += vy * dt;
      alpha -= 0.8 * dt;
      
      sp.style.transform = `translate(${x}px, ${y}px) scale(${Math.max(0, alpha)})`;
      sp.style.opacity   = Math.max(0, alpha);
      
      if (alpha > 0) requestAnimationFrame(anim);
      else sp.remove();
    })(performance.now());
  }
});

function updateTime() {
  const now = new Date();
  const timeString = now.toLocaleTimeString('en-US', {
    timeZone: 'Asia/Bahrain',
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  });
  const parts = timeString.split(' ');
  document.getElementById('time-hours').textContent = parts[0];
  document.getElementById('time-ampm').textContent = parts[1];
}
setInterval(updateTime, 1000);
updateTime();

async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=26.1933&longitude=50.5577&current=temperature_2m,weather_code&timezone=Asia%2FRiyadh');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    
    const wmoMap = {
      0: { desc: 'Clear', icon: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' },
      1: { desc: 'Mostly Clear', icon: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' },
      2: { desc: 'Partly Cloudy', icon: '<svg viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>' },
      3: { desc: 'Overcast', icon: '<svg viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>' },
      45: { desc: 'Fog', icon: '<svg viewBox="0 0 24 24"><path d="M4 14h16"/><path d="M4 18h16"/><path d="M4 10h16"/><path d="M4 6h16"/></svg>' },
      48: { desc: 'Freezing Fog', icon: '<svg viewBox="0 0 24 24"><path d="M4 14h16"/><path d="M4 18h16"/><path d="M4 10h16"/><path d="M4 6h16"/></svg>' },
      51: { desc: 'Drizzle', icon: '<svg viewBox="0 0 24 24"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>' }
    };
    
    let info = wmoMap[code] || { desc: 'Precip', icon: '<svg viewBox="0 0 24 24"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>' };
    if(code >= 61 && code <= 65) info = { desc: 'Rain', icon: '<svg viewBox="0 0 24 24"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>' };
    if(code >= 71 && code <= 77) info = { desc: 'Snow', icon: '<svg viewBox="0 0 24 24"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M8 14l4 6 4-6"/></svg>' };
    if(code >= 95) info = { desc: 'Storm', icon: '<svg viewBox="0 0 24 24"><path d="M20 16.2A4.5 4.5 0 0 0 17.5 8h-1.8A7 7 0 1 0 4 14.9"/><path d="M13 14l-4 5h5l-2 5"/></svg>' };

    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-desc').textContent = 'TUBLI • ' + info.desc.toUpperCase();
    document.getElementById('weather-icon').innerHTML = info.icon;
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'UNAVAILABLE';
  }
}
fetchWeather();
setInterval(fetchWeather, 30 * 60 * 1000);
</script>
