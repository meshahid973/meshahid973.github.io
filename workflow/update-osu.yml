name: Update osu stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-osu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Update osu data
        env:
          OSU_KEY: ${{ secrets.OSU_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const key = process.env.OSU_KEY;
          const user = "meshahid973";

          if (!key) {
            throw new Error("Missing OSU_KEY secret. Add it in Settings > Secrets and variables > Actions > Secrets.");
          }

          function cleanNumber(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number : null;
          }

          async function main() {
            const url = "https://osu.ppy.sh/api/get_user?k=" + encodeURIComponent(key) + "&u=" + encodeURIComponent(user) + "&m=0&type=string&event_days=31";
            const res = await fetch(url);

            if (!res.ok) {
              throw new Error("osu api failed: " + res.status);
            }

            const data = await res.json();
            const osu = Array.isArray(data) ? data[0] : null;

            if (!osu) {
              throw new Error("osu user not found");
            }

            const output = {
              username: osu.username || user,
              user_id: osu.user_id || null,
              rank: cleanNumber(osu.pp_rank),
              country: osu.country || null,
              country_rank: cleanNumber(osu.pp_country_rank),
              pp: cleanNumber(osu.pp_raw),
              accuracy: cleanNumber(osu.accuracy),
              playcount: cleanNumber(osu.playcount),
              level: cleanNumber(osu.level),
              total_seconds_played: cleanNumber(osu.total_seconds_played),
              grades: {
                ss: cleanNumber(osu.count_rank_ss) + cleanNumber(osu.count_rank_ssh),
                s: cleanNumber(osu.count_rank_s) + cleanNumber(osu.count_rank_sh),
                a: cleanNumber(osu.count_rank_a)
              },
              updated_at: new Date().toISOString(),
              error: false
            };

            const dir = path.join(process.cwd(), "data");
            fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(path.join(dir, "osu.json"), JSON.stringify(output, null, 2) + "\n");
          }

          main();
          NODE

      - name: Commit osu data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/osu.json
          git diff --cached --quiet || git commit -m "Update osu stats"
          git push
